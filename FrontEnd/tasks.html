<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tasks</title>

  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <link rel="stylesheet" href="index.css">

  <style>
    .sortable {
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>

  <section class="p-3">
    <div class="row">
      <div class="col-9">
        <button class="btn btn-primary float-start" data-bs-toggle="modal" data-bs-target="#addTaskModal">New Task <i class="bi bi-journal-plus"></i></button>
      </div>
      <div class="col-3">
        <input type="text" class="form-control" id="filterInput" placeholder="Search tasks...">
      </div>
    </div>

    <div class="row mt-5">
      <div class="col-12">
        <table class="table table-striped table-hover text-center table-bordered" id="tasksTable">
          <thead>
            <tr>
              <th class="sortable" onclick="sortTable(0)">Task ID</th>
              <th class="sortable" onclick="sortTable(1)">Task URL</th>
              <th class="sortable" onclick="sortTable(2)">Task Number</th>
              <th class="sortable" onclick="sortTable(3)">Task Type</th>
              <th class="sortable" onclick="sortTable(4)">Total Hours</th>
              <th class="sortable" onclick="sortTable(5)">Assignee</th>
            </tr>
          </thead>
          
          <tbody id="taskRows"></tbody>
        </table>
      </div>
    </div>
  </section>

  <!-- Modal form for adding tasks -->
  <div class="modal fade" id="addTaskModal">
    <div class="modal-dialog modal-dialog-centered modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Add New Task</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <form id="taskForm">
            <div class="mb-3">
              <label for="taskURL" class="form-label">Task URL:</label>
              <input type="text" class="form-control" id="taskURL" required>
            </div>
            <div class="mb-3">
              <label for="taskNumber" class="form-label">Task Number:</label>
              <input type="text" class="form-control" id="taskNumber" required>
            </div>
            <div class="mb-3">
              <label for="taskType" class="form-label">Task Type:</label>
              <input type="text" class="form-control" id="taskType" required>
            </div>
            <div class="mb-3">
              <label for="totalHours" class="form-label">Total Hours:</label>
              <input type="number" class="form-control" id="totalHours" required>
            </div>
            <div class="mb-3">
              <label for="assigneeName" class="form-label">Assignee:</label>
              <select id="assigneeName" name="assigneeName" required>
                  <option value="">Select Assignee</option>
              </select>
            </div>
            <button type="submit" class="btn btn-primary" id="createTaskBtn">Create Task</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Function to sort table by column index
    function sortTable(columnIndex) {
      const table = document.getElementById("tasksTable");
      const rows = table.rows;
      let switching = true; // Changed const to let
      let shouldSwitch;
      let i;
  
      while (switching) {
        switching = false;
        for (i = 1; i < rows.length - 1; i++) {
          shouldSwitch = false;
          const x = rows[i].getElementsByTagName("td")[columnIndex];
          const y = rows[i + 1].getElementsByTagName("td")[columnIndex];
          if (x.innerHTML.toLowerCase() > y.innerHTML.toLowerCase()) {
            shouldSwitch = true;
            break;
          }
        }
        if (shouldSwitch) {
          rows[i].parentNode.insertBefore(rows[i + 1], rows[i]);
          switching = true;
        }
      }
    }
  </script>
  
  
  <!-- Bootstrap bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous">
  </script>

  <!-- JavaScript to fetch assignee names and populate dropdown -->
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      // Fetch assignee names and populate the dropdown
      fetch('http://localhost:8080/newhireinfo/names')
    .then(response => response.json())
    .then(names => {
        if (Array.isArray(names)) {
            names.forEach(name => {
                const option = document.createElement("option");
                option.value = name;
                option.text = name;
                assigneeSelect.appendChild(option);
            });
        } else {
            console.error('Error fetching assignee names: Response is not an array');
        }
    })
    .catch(error => {
        console.error('Error fetching assignee names:', error);
    });


      // Function to handle form submission
      const submitForm = (event) => {
        event.preventDefault();

        const taskData = {
          taskURL: document.getElementById('taskURL').value,
          taskNumber: document.getElementById('taskNumber').value,
          taskType: document.getElementById('taskType').value,
          totalHours: document.getElementById('totalHours').value,
          employeeID: document.getElementById('employeeID').value
        };

        fetch('http://localhost:8080/createPeerCodingTask', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify(taskData),
        })
          .then(response => response.json())
          .then(data => {
            console.log('Success:', data);
          })
          .catch((error) => {
            console.error('Error:', error);
          });
      };

      // Attach submit event listener to the form
      document.getElementById('taskForm').addEventListener('submit', submitForm);

      // Fetch tasks and populate table
      fetch('http://localhost:8080/peercodingtasks')
        .then(response => response.json())
        .then(data => {
          const tableBody = document.getElementById('taskRows');

          data.forEach(task => {
            const row = document.createElement('tr');
            row.innerHTML = `
              <td>${task.taskId}</td>
              <td>${task.taskUrl}</td>
              <td>${task.taskNumber}</td>
              <td>${task.taskType}</td>
              <td>${task.totalHours}</td>
              <td>${task.assigneeName}</td>
            `;
            tableBody.appendChild(row);
          });
        })
        .catch(error => console.error('Error fetching tasks:', error));

      // Add event listener to filter tasks
      document.getElementById('filterInput').addEventListener('input', function () {
        const filterValue = this.value.toUpperCase();
        const rows = document.querySelectorAll('#tasksTable tbody tr');
        rows.forEach(row => {
          const cells = row.querySelectorAll('td');
          let found = false;
          cells.forEach(cell => {
            if (cell.textContent.toUpperCase().includes(filterValue)) {
              found = true;
            }
          });
          row.style.display = found ? '' : 'none';
        });
      });
    });
  </script>
</body>

</html>
